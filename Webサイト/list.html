    <script>
        // モーダルを開くボタン
        const openModalButton = document.getElementById('titleHeading');
        // モーダルそのもの
        const modal = document.getElementById('myModal');
        // モーダルを閉じる<span>要素
        const closeSpan = document.getElementsByClassName('close')[0];

        // ボタンをクリックしてモーダルを表示する
        openModalButton.addEventListener('click', () => {
            modal.style.display = 'block';
        });

        // <span>要素をクリックしてモーダルを閉じる
        closeSpan.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // モーダルの外側をクリックしてモーダルを閉じる
        window.addEventListener('click', (event) => {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        });
    </script>

<script>
        document.addEventListener('DOMContentLoaded', function() {
            const redirectButton = document.getElementById('redirectButton');
            const customLink = localStorage.getItem('customLink');

            if (customLink) {
                redirectButton.disabled = false;
                redirectButton.classList.remove('disabled');
                redirectButton.addEventListener('click', function() {
                    window.location.href = customLink;
               });
            } else {
                redirectButton.disabled = true;
                redirectButton.classList.add('disabled');
            }
        });
    </script>
